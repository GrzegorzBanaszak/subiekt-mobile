name: Build and deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: subiekt-mobile-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: grzegorzbanaszak

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: subiekt-mobile-api
            dockerfile: backend/Dockerfile

          - image: subiekt-mobile-web
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  request-deployment:
    name: Request homelab deployment
    needs:
      - build-and-push

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Send deployment request
        shell: bash
        env:
          DEPLOY_TOKEN: ${{ secrets.HOMELAB_DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_TOKEN:-}" ]]; then
            echo "Brakuje sekretu HOMELAB_DEPLOY_TOKEN."
            exit 1
          fi

          PAYLOAD="$(
            jq -n \
              --arg app "subiekt-mobile" \
              --arg image_tag "$IMAGE_TAG" \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg commit "$GITHUB_SHA" \
              '{
                event_type: "deploy",
                client_payload: {
                  app: $app,
                  image_tag: $image_tag,
                  repository: $repository,
                  commit: $commit
                }
              }'
          )"

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --location \
              --output /tmp/deploy-response.txt \
              --write-out "%{http_code}" \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $DEPLOY_TOKEN" \
              --header "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/GrzegorzBanaszak/homelab-deploy/dispatches \
              --data "$PAYLOAD"
          )"

          if [[ "$HTTP_STATUS" != "204" ]]; then
            echo "Nie udało się uruchomić wdrożenia."
            echo "Kod HTTP: $HTTP_STATUS"
            cat /tmp/deploy-response.txt
            exit 1
          fi

          echo "Przekazano wdrożenie subiekt-mobile."
          echo "Tag obrazu: $IMAGE_TAG"
