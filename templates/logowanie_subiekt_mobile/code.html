<!DOCTYPE html>

<html lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Subiekt Mobile - Logowanie</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#4059aa",
                        "outline": "#757682",
                        "on-secondary-fixed": "#002114",
                        "primary": "#00236f",
                        "on-secondary-container": "#00714e",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#dce1ff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed-variant": "#264191",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-container": "#653400",
                        "surface-dim": "#d9dadb",
                        "on-surface": "#191c1d",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#444651",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#85f8c4",
                        "on-error-container": "#93000a",
                        "background": "#f8f9fa",
                        "secondary-fixed-dim": "#68dba9",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "primary-container": "#1e3a8a",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-fixed-variant": "#005137",
                        "on-background": "#191c1d",
                        "secondary": "#006c4a",
                        "on-tertiary-fixed": "#2f1500",
                        "on-tertiary-container": "#fc922b",
                        "on-primary-fixed": "#00164e",
                        "tertiary-fixed": "#ffdcc3",
                        "inverse-primary": "#b6c4ff",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "inverse-surface": "#2e3132",
                        "on-primary-container": "#90a8ff",
                        "secondary-container": "#82f5c1",
                        "surface-container": "#edeeef",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c5c5d3",
                        "surface": "#f8f9fa",
                        "primary-fixed-dim": "#b6c4ff",
                        "tertiary-fixed-dim": "#ffb77d",
                        "surface-container-low": "#f3f4f5",
                        "tertiary": "#442100",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "12px",
                        "xs": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "base": "4px",
                        "touch-target": "48px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-lowest min-h-screen flex items-center justify-center p-md text-on-surface">
<div class="w-full max-w-[400px] flex flex-col gap-lg bg-surface-container-lowest p-xl border border-outline-variant rounded-xl shadow-lg">
<!-- Logo & Title -->
<div class="flex flex-col items-center gap-sm mb-sm text-center">
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center mb-xs">
<span class="material-symbols-outlined text-[32px]">inventory_2</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary m-0">Subiekt Mobile</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Logowanie do systemu magazynowego</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault(); document.getElementById('error-message').classList.remove('hidden');">
<!-- Error Message (Hidden by default) -->
<div class="hidden bg-error-container text-on-error-container p-sm rounded-lg flex items-center gap-xs border border-error" id="error-message">
<span class="material-symbols-outlined">error</span>
<span class="font-body-sm text-body-sm">Nieprawidłowy użytkownik lub hasło.</span>
</div>
<!-- Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="username">Użytkownik</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">person</span>
<input class="w-full h-touch-target pl-[40px] pr-sm bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface placeholder-on-surface-variant transition-colors" id="username" name="username" placeholder="Wprowadź nazwę użytkownika" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Hasło</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">lock</span>
<input class="w-full h-touch-target pl-[40px] pr-sm bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface placeholder-on-surface-variant transition-colors" id="password" name="password" placeholder="Wprowadź hasło" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="h-touch-target mt-sm bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-xs hover:bg-surface-tint transition-colors active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined">login</span>
                Zaloguj
            </button>
<div class="text-center mt-xs">
<a class="font-body-sm text-body-sm text-primary hover:underline" href="#">Potrzebujesz pomocy?</a>
</div>
</form>
</div>
</body></html>
