services:
  application-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APPLICATION_DB_NAME:-subiekt_mobile}
      POSTGRES_USER: ${APPLICATION_DB_USER:-subiekt_mobile}
      POSTGRES_PASSWORD: ${APPLICATION_DB_PASSWORD:?Set APPLICATION_DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:${APPLICATION_DB_PORT:-5432}:5432"
    volumes:
      - application-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  application-db-data:
